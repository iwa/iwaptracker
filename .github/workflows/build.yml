name: Compile project

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5.5.0
        with:
          go-version: "1.26"

      - name: Build
        run: CGO_ENABLED=0 GOOS=linux go build -o main main.go types.go db.go
